version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 15
    labels:
      - "dependencies"
      - "chore"
    commit-message:
      prefix: "chore(deps)"
    groups:
      dev-tooling:
        dependency-type: "development"
        exclude-patterns:
          - "@commitlint/*"
        update-types:
          - "minor"
          - "patch"
      commitlint:
        patterns:
          - "@commitlint/*"
    ignore:
      # React 18 — intentional; no major upgrade planned
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # Tailwind v4 — full rewrite, defer indefinitely
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # hCaptcha v2 — evaluate later
      - dependency-name: "@hcaptcha/react-hcaptcha"
        update-types: ["version-update:semver-major"]
      # lucide-react v1 — planned migration branch needed (icon renames)
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "devops"
    commit-message:
      prefix: "ci(deps)"
