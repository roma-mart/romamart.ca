<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- <meta http-equiv="X-Content-Type-Options" content="nosniff" /> -->
    <!-- only available for server headers - cannot apply in static sites -->
    <meta name="description" content="Sarnia's convenience store on Wellington St. Halal meat, Bitcoin ATM, global snacks, RoCafé coffee, lottery &amp; tobacco. Open 7 days." />
    <!-- Progressive enhancement: theme-color supported in Chrome, Safari, Edge (not Firefox/Opera) -->
    <!-- Must match tokens.js brandColors.navy (static HTML: no CSS vars) -->
    <meta name="theme-color" content="#020178" />
    <!-- Primary favicon for modern browsers -->
    <link rel="icon" type="image/png" sizes="192x192" href="/android/android-launchericon-192-192.png" />
    <!-- PNG favicon for legacy browsers -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <!-- Apple touch icon (PNG, 180x180) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- PWA capable meta tags -->
    <!-- Standard (Chrome/Edge): silences the apple-mobile-web-app-capable deprecation warning -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Apple (iOS Safari): still required — Safari ignores the unprefixed version -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Roma Mart" />
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="canonical" href="https://romamart.ca/" />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="business.business" />
    <meta property="og:url" content="https://romamart.ca/" />
    <meta property="og:title" content="Roma Mart — Sarnia Convenience Store | Halal Meat, Bitcoin ATM, Coffee" />
    <meta property="og:description" content="Sarnia's convenience store on Wellington St. Halal meat, Bitcoin ATM, global snacks, RoCafé coffee, lottery &amp; tobacco. Open 7 days." />
    <meta property="og:image" content="https://romamart.ca/og-image.jpg" />
    <meta property="og:image:alt" content="Roma Mart storefront and branding" />
    <meta property="og:locale" content="en_CA" />
    <meta property="og:site_name" content="Roma Mart Convenience" />
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://romamart.ca/" />
    <meta property="twitter:title" content="Roma Mart — Sarnia Convenience Store | Halal Meat, Bitcoin ATM, Coffee" />
    <meta property="twitter:description" content="Sarnia's convenience store on Wellington St. Halal meat, Bitcoin ATM, global snacks, RoCafé coffee, lottery &amp; tobacco. Open 7 days." />

    <meta property="twitter:image:alt" content="Roma Mart storefront and branding" />
    <!-- DNS prefetch for APIs used at runtime -->
    <link rel="dns-prefetch" href="https://places.googleapis.com" />
    <link rel="dns-prefetch" href="https://romamart.netlify.app" />
    <link rel="dns-prefetch" href="https://tcdigital.vip" />

    <title>Roma Mart — Sarnia Convenience Store | Halal Meat, Bitcoin ATM, Coffee</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Aria AI Agent Widget — loaded on idle to avoid blocking LCP -->
    <script>
      (function loadAria() {
        var load = function () {
          var s = document.createElement('script');
          s.src = 'https://tcdigital.vip/aria.js';
          s.dataset.widget = 'wgt_roma';
          s.onload = function () {
            var applyLabel = function () {
              var btn = document.querySelector('#tcd-widget-container button');
              if (btn) { btn.setAttribute('aria-label', 'Chat with Aria AI assistant'); return true; }
              return false;
            };
            // Apply immediately if the button already exists; the MutationObserver may otherwise miss it.
            if (applyLabel()) return;
            var obs = new MutationObserver(function (_, o) {
              if (applyLabel()) o.disconnect();
            });
            obs.observe(document.body, { childList: true, subtree: true });
            setTimeout(function () { obs.disconnect(); }, 15000);
          };
          document.body.appendChild(s);
        };
        if ('requestIdleCallback' in window) {
          requestIdleCallback(load, { timeout: 3000 });
        } else {
          setTimeout(load, 2000);
        }
      })();
    </script>
  </body>
</html>
